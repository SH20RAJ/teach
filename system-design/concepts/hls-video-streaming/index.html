<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eraser Board - System Design Interactive Teacher</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Excalidraw Stylesheets -->
  <link rel="stylesheet" href="https://esm.sh/@excalidraw/excalidraw@0.18.0/dist/dev/index.css" />

  <style>
    :root {
      --font-sans: 'Inter', sans-serif;
      --font-title: 'Outfit', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      /* Dark Mode Palette (Default) */
      --bg-base: #0B0F19;
      --bg-panel: #131B2E;
      --bg-surface: #1E293B;
      --border-color: #2E3E5B;
      --text-main: #E2E8F0;
      --text-muted: #94A3B8;
      --accent: #38BDF8;
      --accent-hover: #0EA5E9;
      --accent-bg: rgba(56, 189, 248, 0.1);
      --success: #34D399;
      --danger: #F87171;
      
      --canvas-bg: #1e1e1e;
    }

    .light-theme {
      /* Light Mode Palette */
      --bg-base: #F8FAFC;
      --bg-panel: #FFFFFF;
      --bg-surface: #F1F5F9;
      --border-color: #E2E8F0;
      --text-main: #0F172A;
      --text-muted: #64748B;
      --accent: #0284C7;
      --accent-hover: #0369A1;
      --accent-bg: rgba(2, 132, 199, 0.08);
      --success: #10B981;
      --danger: #EF4444;

      --canvas-bg: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      transition: background-color 0.2s, border-color 0.2s;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* Header Bar */
    header {
      height: 60px;
      background-color: var(--bg-panel);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      color: var(--accent);
      animation: pulse 2s infinite;
    }

    .logo-title {
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.025em;
      background: linear-gradient(135deg, var(--accent), #818CF8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-tag {
      font-size: 0.7rem;
      background-color: var(--border-color);
      color: var(--text-muted);
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Button Styling */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border-color);
      background-color: var(--bg-surface);
      color: var(--text-main);
      outline: none;
    }

    .btn:hover {
      background-color: var(--border-color);
    }

    .btn-primary {
      background-color: var(--accent);
      color: #000000;
      border-color: var(--accent);
      font-weight: 600;
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn-icon {
      padding: 8px;
      border-radius: 8px;
    }

    /* Main Workspace Panels */
    .workspace {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* Left Sidebar: Document and Index */
    .sidebar {
      width: 320px;
      background-color: var(--bg-panel);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 15px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-title {
      font-family: var(--font-title);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: 700;
    }

    .slides-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .slide-item {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      cursor: pointer;
      background-color: var(--bg-base);
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
    }

    .slide-item:hover {
      border-color: var(--accent);
    }

    .slide-item.active {
      border-color: var(--accent);
      background-color: var(--accent-bg);
    }

    .slide-item-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .slide-item-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .slide-item-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .slide-item:hover .slide-item-actions {
      opacity: 1;
    }

    .action-icon-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px;
    }

    .action-icon-btn:hover {
      color: var(--text-main);
    }

    /* Note Editor Panel */
    .note-editor {
      height: 250px;
      border-top: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      background-color: var(--bg-panel);
    }

    .note-editor-header {
      padding: 10px 15px;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .note-textarea {
      flex: 1;
      width: 100%;
      padding: 12px;
      background-color: var(--bg-base);
      color: var(--text-main);
      border: none;
      resize: none;
      font-family: var(--font-sans);
      font-size: 0.85rem;
      line-height: 1.5;
      outline: none;
    }

    /* Right Canvas / Main Viewer */
    .viewer-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-base);
      position: relative;
      overflow: hidden;
    }

    .viewer-toolbar {
      height: 48px;
      background-color: var(--bg-panel);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    .slide-title-input {
      font-family: var(--font-title);
      font-size: 1.1rem;
      font-weight: 700;
      background: transparent;
      border: none;
      color: var(--text-main);
      outline: none;
      width: 60%;
    }

    .slide-title-input:focus {
      border-bottom: 1px dashed var(--accent);
    }

    .slide-layout-select {
      background-color: var(--bg-surface);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.75rem;
      outline: none;
      cursor: pointer;
    }

    /* Slide Display Canvas */
    .slide-frame {
      flex: 1;
      display: flex;
      padding: 30px;
      overflow: hidden;
      position: relative;
    }

    .slide-card {
      flex: 1;
      background-color: var(--bg-panel);
      border-radius: 12px;
      border: 1px solid var(--border-color);
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* Markdown Slide Text Panel */
    .slide-text-panel {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .slide-text-panel.editing-mode {
      padding: 0;
    }

    .slide-markdown-textarea {
      width: 100%;
      height: 100%;
      padding: 40px;
      background-color: transparent;
      color: var(--text-main);
      border: none;
      resize: none;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      line-height: 1.6;
      outline: none;
    }

    /* Beautiful markdown rendering styles */
    .markdown-rendered {
      font-family: var(--font-sans);
      line-height: 1.7;
      font-size: 1rem;
    }

    .markdown-rendered h1, 
    .markdown-rendered h2, 
    .markdown-rendered h3 {
      font-family: var(--font-title);
      color: var(--text-main);
      margin-top: 1rem;
      margin-bottom: 0.75rem;
      font-weight: 700;
    }

    .markdown-rendered h1 { font-size: 2rem; border-bottom: 2px solid var(--border-color); padding-bottom: 8px; }
    .markdown-rendered h2 { font-size: 1.5rem; }
    .markdown-rendered h3 { font-size: 1.2rem; }

    .markdown-rendered ul, 
    .markdown-rendered ol {
      margin-left: 20px;
      margin-bottom: 1rem;
    }

    .markdown-rendered li {
      margin-bottom: 6px;
    }

    .markdown-rendered code {
      font-family: var(--font-mono);
      font-size: 0.85em;
      background-color: var(--bg-surface);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--accent);
    }

    .markdown-rendered pre {
      background-color: var(--bg-base);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 15px;
      overflow-x: auto;
      margin-bottom: 1.2rem;
    }

    .markdown-rendered pre code {
      background-color: transparent;
      padding: 0;
      color: var(--text-main);
    }

    .markdown-rendered blockquote {
      border-left: 4px solid var(--accent);
      padding-left: 15px;
      margin-left: 0;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Excalidraw Component Container */
    .whiteboard-container {
      flex: 1;
      height: 100%;
      border-left: 1px solid var(--border-color);
      position: relative;
      background-color: var(--canvas-bg);
    }

    .whiteboard-container.full {
      border-left: none;
    }

    /* Overlay Drawing Mode */
    .overlay-draw-layer {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      pointer-events: auto; /* Excalidraw captures clicks */
    }

    .overlay-content-behind {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1;
      padding: 40px;
      overflow-y: auto;
    }

    /* Fullscreen Presenter Mode */
    .present-mode-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #05070B;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      padding: 40px;
    }

    .present-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      color: var(--text-muted);
    }

    .present-body {
      flex: 1;
      background-color: var(--bg-panel);
      border-radius: 16px;
      border: 1px solid var(--border-color);
      display: flex;
      overflow: hidden;
      position: relative;
    }

    .present-footer {
      height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    /* Toast Notifications */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background-color: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-left: 4px solid var(--success);
      padding: 16px 20px;
      border-radius: 8px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10000;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast-icon {
      color: var(--success);
    }

    /* Animations */
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>

  <!-- Configure Excalidraw Asset Path -->
  <script>
    window.EXCALIDRAW_ASSET_PATH = "https://esm.sh/@excalidraw/excalidraw@0.18.0/dist/prod/";
  </script>

  <!-- Import Map for React Dependencies -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
      "react-dom": "https://esm.sh/react-dom@18.2.0"
    }
  }
  </script>
</head>
<body class="dark-theme">
  <div id="root" style="height: 100%; display: flex; flex-direction: column;"></div>

  <!-- React Application Core -->
  <script type="module">
    import React, { useState, useEffect, useRef } from "react";
    import ReactDOM from "react-dom/client";
    import { Excalidraw } from "https://esm.sh/@excalidraw/excalidraw@0.18.0";

    const h = React.createElement;

    function App() {
      // Presentation State
      const [slides, setSlides] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [isDarkMode, setIsDarkMode] = useState(true);
      const [isPreviewMode, setIsPreviewMode] = useState(true); // Toggle markdown view vs edit textarea
      const [isOverlayDrawing, setIsOverlayDrawing] = useState(false); // Draw on top of text
      const [isPresentMode, setIsPresentMode] = useState(false);
      const [toast, setToast] = useState({ show: false, message: "" });
      
      // References
      const excalidrawAPIRef = useRef(null);
      const overlayExcalidrawAPIRef = useRef(null);
      
      // Load Slides data
      useEffect(() => {
        fetch("/api/slides")
          .then(res => res.json())
          .then(data => {
            setSlides(data.slides || []);
            setCurrentIndex(data.currentSlideIndex || 0);
          })
          .catch(err => {
            console.error("Error fetching slides:", err);
            showToast("Failed to load slides from server. Running offline.");
          });
      }, []);

      // Toggle Theme
      const toggleTheme = () => {
        setIsDarkMode(!isDarkMode);
        document.body.classList.toggle("light-theme");
      };

      // Toast feedback helper
      const showToast = (message) => {
        setToast({ show: true, message });
        setTimeout(() => {
          setToast({ show: false, message: "" });
        }, 3000);
      };

      // Excalidraw Scene Serialization
      const saveCurrentDrawingState = () => {
        if (!slides || slides.length === 0) return;
        
        const activeSlide = slides[currentIndex];
        let stateChanged = false;
        
        // Check normal side-by-side whiteboard
        if (excalidrawAPIRef.current) {
          const elements = excalidrawAPIRef.current.getSceneElements();
          const serial = JSON.stringify(elements);
          if (activeSlide.excalidrawState !== serial) {
            activeSlide.excalidrawState = serial;
            stateChanged = true;
          }
        }

        // Check overlay whiteboard
        if (isOverlayDrawing && overlayExcalidrawAPIRef.current) {
          const elements = overlayExcalidrawAPIRef.current.getSceneElements();
          const serial = JSON.stringify(elements);
          if (activeSlide.overlayState !== serial) {
            activeSlide.overlayState = serial;
            stateChanged = true;
          }
        }
        
        if (stateChanged) {
          setSlides([...slides]);
        }
      };

      // Navigation handler with state preserving
      const changeSlide = (index) => {
        if (index < 0 || index >= slides.length) return;
        saveCurrentDrawingState();
        setCurrentIndex(index);
        
        // Reset overlay drawing flag on slide change
        setIsOverlayDrawing(false);
      };

      // Restore scene data when switching slides
      useEffect(() => {
        if (slides.length === 0) return;
        const activeSlide = slides[currentIndex];

        // Restore split/full drawing canvas
        if (excalidrawAPIRef.current && activeSlide.excalidrawState) {
          try {
            const elements = JSON.parse(activeSlide.excalidrawState);
            excalidrawAPIRef.current.updateScene({ elements });
          } catch(e) {
            console.error("Failed to parse canvas elements");
          }
        } else if (excalidrawAPIRef.current) {
          excalidrawAPIRef.current.resetScene();
        }

        // Restore overlay canvas if applicable
        if (isOverlayDrawing && overlayExcalidrawAPIRef.current && activeSlide.overlayState) {
          try {
            const elements = JSON.parse(activeSlide.overlayState);
            overlayExcalidrawAPIRef.current.updateScene({ elements });
          } catch (e) {
            console.error("Failed to parse overlay canvas");
          }
        }
      }, [currentIndex, slides, isOverlayDrawing]);

      // Server HTTP Save triggering
      const triggerSave = () => {
        saveCurrentDrawingState();
        
        fetch("/api/save", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            currentSlideIndex: currentIndex,
            slides: slides
          })
        })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            showToast("Saved presentation to file system!");
          } else {
            showToast("Save failed: " + data.error);
          }
        })
        .catch(err => {
          console.error("Save error:", err);
          showToast("Failed to connect to local Node server.");
        });
      };

      // Add Slide
      const addNewSlide = (layout = "split") => {
        saveCurrentDrawingState();
        
        const newSlide = {
          id: "slide_" + Date.now(),
          title: "New Teaching Slide",
          content: "### Heading\n- Write content here...\n- Double click or toggle edit mode to change.",
          notes: "Add teacher delivery guidelines here.",
          layout: layout,
          excalidrawState: ""
        };

        const updated = [...slides];
        updated.splice(currentIndex + 1, 0, newSlide);
        setSlides(updated);
        setCurrentIndex(currentIndex + 1);
      };

      // Delete Slide
      const deleteSlide = (idx, e) => {
        e.stopPropagation();
        if (slides.length <= 1) {
          showToast("Cannot delete the last remaining slide.");
          return;
        }
        
        const updated = slides.filter((_, i) => i !== idx);
        setSlides(updated);
        
        if (currentIndex >= updated.length) {
          setCurrentIndex(updated.length - 1);
        }
      };

      // Move Slide Order
      const moveSlide = (idx, direction, e) => {
        e.stopPropagation();
        const targetIdx = idx + direction;
        if (targetIdx < 0 || targetIdx >= slides.length) return;
        
        saveCurrentDrawingState();
        const updated = [...slides];
        const temp = updated[idx];
        updated[idx] = updated[targetIdx];
        updated[targetIdx] = temp;
        
        setSlides(updated);
        if (currentIndex === idx) {
          setCurrentIndex(targetIdx);
        } else if (currentIndex === targetIdx) {
          setCurrentIndex(idx);
        }
      };

      // Update slide metadata/text dynamically
      const updateActiveSlideField = (field, val) => {
        const updated = [...slides];
        updated[currentIndex][field] = val;
        setSlides(updated);
      };

      // Keyboard shortcuts for presenting
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.target.tagName === "TEXTAREA" || e.target.tagName === "INPUT" || e.target.contentEditable === "true") {
            return;
          }
          if (e.key === "ArrowRight") {
            changeSlide(currentIndex + 1);
          } else if (e.key === "ArrowLeft") {
            changeSlide(currentIndex - 1);
          } else if (e.key === "Escape" && isPresentMode) {
            setIsPresentMode(false);
          }
        };
        window.addEventListener("keydown", handleKeyDown);
        return () => window.removeEventListener("keydown", handleKeyDown);
      }, [currentIndex, slides, isPresentMode]);

      // Initialize slide properties if none exist
      if (slides.length === 0) {
        return h("div", { style: { display: "flex", flex: 1, alignItems: "center", justifyContent: "center", color: "var(--text-muted)" } }, [
          h("div", null, "Loading presentation assets...")
        ]);
      }

      const activeSlide = slides[currentIndex];

      // Markdown renderer helper
      const renderMarkdown = (text) => {
        try {
          return { __html: marked.parse(text || "") };
        } catch (e) {
          return { __html: text };
        }
      };

      return h("div", { style: { display: "flex", flexDirection: "column", flex: 1, height: "100%" } }, [
        
        // 1. TOP HEADER TOOLBAR
        h("header", null, [
          h("div", { className: "logo-container" }, [
            h("i", { "data-lucide": "feather", className: "logo-icon" }),
            h("span", { className: "logo-title" }, "Eraser Board"),
            h("span", { className: "logo-tag" }, "HLS System Design")
          ]),
          
          h("div", { className: "toolbar" }, [
            // Dark Mode toggle
            h("button", { className: "btn btn-icon", onClick: toggleTheme, title: "Toggle Light/Dark Theme" }, [
              h("i", { "data-lucide": isDarkMode ? "sun" : "moon" })
            ]),
            
            // Present button
            h("button", { className: "btn", onClick: () => setIsPresentMode(true), title: "Presentation Mode (Fullscreen)" }, [
              h("i", { "data-lucide": "presentation" }),
              "Present"
            ]),
            
            // Add slide split button
            h("button", { className: "btn", onClick: () => addNewSlide("split"), title: "Create a standard Split text/whiteboard slide" }, [
              h("i", { "data-lucide": "plus" }),
              "Add Slide"
            ]),
            
            // Save to server
            h("button", { className: "btn btn-primary", onClick: triggerSave, title: "Save current state permanently to slides_data.json" }, [
              h("i", { "data-lucide": "save" }),
              "Save to File"
            ])
          ])
        ]),

        // 2. MAIN WORKSPACE CONTAINER
        h("div", { className: "workspace" }, [
          
          // LEFT PANEL: Slide indices and outline notes
          h("div", { className: "sidebar" }, [
            h("div", { className: "sidebar-header" }, [
              h("span", { className: "sidebar-title" }, "Slide Outline"),
              h("span", null, `${currentIndex + 1} of ${slides.length}`)
            ]),
            
            // Slide Index Scroll List
            h("div", { className: "slides-list" }, 
              slides.map((slide, idx) => 
                h("div", { 
                  key: slide.id,
                  className: `slide-item ${currentIndex === idx ? "active" : ""}`,
                  onClick: () => changeSlide(idx)
                }, [
                  h("div", { className: "slide-item-title" }, `${idx + 1}. ${slide.title}`),
                  h("div", { className: "slide-item-meta" }, [
                    h("span", null, slide.layout.toUpperCase()),
                    h("div", { className: "slide-item-actions" }, [
                      h("button", { className: "action-icon-btn", onClick: (e) => moveSlide(idx, -1, e), title: "Move Slide Up" }, [
                        h("i", { "data-lucide": "chevron-up", style: { width: "14px", height: "14px" } })
                      ]),
                      h("button", { className: "action-icon-btn", onClick: (e) => moveSlide(idx, 1, e), title: "Move Slide Down" }, [
                        h("i", { "data-lucide": "chevron-down", style: { width: "14px", height: "14px" } })
                      ]),
                      h("button", { className: "action-icon-btn", onClick: (e) => deleteSlide(idx, e), title: "Delete Slide", style: { color: "var(--danger)" } }, [
                        h("i", { "data-lucide": "trash-2", style: { width: "14px", height: "14px" } })
                      ])
                    ])
                  ])
                ])
              )
            ),
            
            // Lecture notes editor for active slide
            h("div", { className: "note-editor" }, [
              h("div", { className: "note-editor-header" }, [
                h("i", { "data-lucide": "sticky-note", style: { width: "14px", height: "14px" } }),
                "Lecture Delivery Notes (Hidden in Present)"
              ]),
              h("textarea", {
                className: "note-textarea",
                placeholder: "Type teaching notes here to help direct your lecture...",
                value: activeSlide.notes || "",
                onChange: (e) => updateActiveSlideField("notes", e.target.value)
              })
            ])
          ]),

          // RIGHT PANEL: Slide Viewer Frame
          h("div", { className: "viewer-container" }, [
            
            // Slide configuration sub-bar
            h("div", { className: "viewer-toolbar" }, [
              h("input", {
                className: "slide-title-input",
                value: activeSlide.title,
                onChange: (e) => updateActiveSlideField("title", e.target.value)
              }),
              
              h("div", { style: { display: "flex", alignItems: "center", gap: "10px" } }, [
                h("button", { 
                  className: `btn ${isPreviewMode ? "btn-primary" : ""}`,
                  style: { fontSize: "0.75rem", padding: "4px 10px" },
                  onClick: () => setIsPreviewMode(!isPreviewMode) 
                }, isPreviewMode ? "View Slide" : "Edit Markdown"),
                
                h("button", { 
                  className: `btn ${isOverlayDrawing ? "btn-primary" : ""}`,
                  style: { fontSize: "0.75rem", padding: "4px 10px" },
                  onClick: () => setIsOverlayDrawing(!isOverlayDrawing),
                  title: "Add transparent drawing layer on top of text content"
                }, "Draw On Top"),

                h("select", {
                  className: "slide-layout-select",
                  value: activeSlide.layout,
                  onChange: (e) => updateActiveSlideField("layout", e.target.value)
                }, [
                  h("option", { value: "split" }, "Layout: Split Screen"),
                  h("option", { value: "text" }, "Layout: Text Only"),
                  h("option", { value: "drawing" }, "Layout: Whiteboard Only")
                ])
              ])
            ]),

            // The main interactive canvas viewport
            h("div", { className: "slide-frame" }, [
              h("div", { className: "slide-card" }, [
                
                // Overlay Excalidraw Layer if toggled
                isOverlayDrawing && h("div", { className: "overlay-draw-layer" }, [
                  h(Excalidraw, {
                    excalidrawAPI: (api) => { overlayExcalidrawAPIRef.current = api; },
                    theme: isDarkMode ? "dark" : "light"
                  })
                ]),

                // Content Panel - Markdown Render / Text Editor
                (activeSlide.layout === "split" || activeSlide.layout === "text") && h("div", { 
                  className: `slide-text-panel ${!isPreviewMode ? "editing-mode" : ""} ${isOverlayDrawing ? "overlay-content-behind" : ""}` 
                }, [
                  isPreviewMode 
                    ? h("div", { 
                        className: "markdown-rendered", 
                        dangerouslySetInnerHTML: renderMarkdown(activeSlide.content) 
                      })
                    : h("textarea", {
                        className: "slide-markdown-textarea",
                        value: activeSlide.content || "",
                        onChange: (e) => updateActiveSlideField("content", e.target.value),
                        placeholder: "Type your slide content here using standard Markdown format..."
                      })
                ]),

                // Side Whiteboard Panel (Split layout) or full screen whiteboard (Drawing layout)
                (activeSlide.layout === "split" || activeSlide.layout === "drawing") && h("div", { 
                  className: `whiteboard-container ${activeSlide.layout === "drawing" ? "full" : ""}` 
                }, [
                  h(Excalidraw, {
                    excalidrawAPI: (api) => { excalidrawAPIRef.current = api; },
                    theme: isDarkMode ? "dark" : "light"
                  })
                ])
              ])
            ])
          ])
        ]),

        // 3. FULLSCREEN PRESENTATION MODE OVERLAY
        isPresentMode && h("div", { className: "present-mode-container" }, [
          h("div", { className: "present-header" }, [
            h("span", { style: { fontFamily: "var(--font-title)", fontWeight: 700, fontSize: "1.2rem", color: "var(--text-main)" } }, 
              `${currentIndex + 1}. ${activeSlide.title}`
            ),
            h("button", { className: "btn", onClick: () => setIsPresentMode(false) }, [
              h("i", { "data-lucide": "x" }), "Exit Show"
            ])
          ]),
          
          h("div", { className: "present-body" }, [
            // Slide Card inside presentation viewport
            h("div", { className: "slide-card", style: { border: "none", boxShadow: "none" } }, [
              
              // Overlay Excalidraw Layer if toggled
              isOverlayDrawing && h("div", { className: "overlay-draw-layer" }, [
                h(Excalidraw, {
                  excalidrawAPI: (api) => { overlayExcalidrawAPIRef.current = api; },
                  theme: "dark"
                })
              ]),

              // Split screen or text-only panel
              (activeSlide.layout === "split" || activeSlide.layout === "text") && h("div", { 
                className: `slide-text-panel ${isOverlayDrawing ? "overlay-content-behind" : ""}`,
                style: { backgroundColor: "transparent" }
              }, [
                h("div", { 
                  className: "markdown-rendered", 
                  dangerouslySetInnerHTML: renderMarkdown(activeSlide.content) 
                })
              ]),

              // Split drawing board or full whiteboard board
              (activeSlide.layout === "split" || activeSlide.layout === "drawing") && h("div", { 
                className: `whiteboard-container ${activeSlide.layout === "drawing" ? "full" : ""}` 
              }, [
                h(Excalidraw, {
                  excalidrawAPI: (api) => { excalidrawAPIRef.current = api; },
                  theme: "dark"
                })
              ])
            ])
          ]),

          h("div", { className: "present-footer" }, [
            h("button", { className: "btn", onClick: () => changeSlide(currentIndex - 1), disabled: currentIndex === 0 }, "◀ Prev"),
            h("span", null, `Slide ${currentIndex + 1} / ${slides.length}`),
            
            h("button", { 
              className: `btn ${isOverlayDrawing ? "btn-primary" : ""}`,
              onClick: () => setIsOverlayDrawing(!isOverlayDrawing) 
            }, "Draw Mode"),
            
            h("button", { className: "btn", onClick: () => changeSlide(currentIndex + 1), disabled: currentIndex === slides.length - 1 }, "Next ▶")
          ])
        ]),

        // 4. TOAST NOTIFICATION CONTAINER
        h("div", { className: `toast ${toast.show ? "show" : ""}` }, [
          h("i", { "data-lucide": "check-circle", className: "toast-icon" }),
          h("span", null, toast.message)
        ])
      ]);
    }

    const container = document.getElementById("root");
    const root = ReactDOM.createRoot(container);
    root.render(h(App));

    // Force Lucide icons rendering after render updates
    setTimeout(() => {
      if (window.lucide) {
        window.lucide.createIcons();
      }
    }, 1000);
  </script>
</body>
</html>
